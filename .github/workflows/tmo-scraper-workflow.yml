name: TMO Product Scraper

on:
  # Run manually
  workflow_dispatch:
    inputs:
      start_index:
        description: 'Start index (0-based)'
        required: true
        default: '0'
      end_index:
        description: 'End index (-1 for all)'
        required: true
        default: '25'

  # Run on schedule (daily at 11:35 PM EDT / 3:35 AM UTC)
  schedule:
    - cron: '35 3 * * *'

jobs:
  scrape:
    uses: ./.github/workflows/scraper-template.yml
    with:
      scraper_name: 'TMO Product Scraper'
      company_ticker: 'tmo'
      module_path: 'tmo-product-scraper'
      java_main_class: 'com.nephron.tmo.FischerSciScrapper'
      start_index: ${{ github.event.inputs.start_index || '0' }}
      end_index: ${{ github.event.inputs.end_index || '-1' }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.NEPHRON_R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.NEPHRON_R2_SECRET_ACCESS_KEY }}


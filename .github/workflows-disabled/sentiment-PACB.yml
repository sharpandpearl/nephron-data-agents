name: PACB (Pacific Biosciences) - Sentiment Analysis

on:
  schedule:
    - cron: '33 8 * * *'
  workflow_dispatch:

jobs:
  analyze:
    uses: ./.github/workflows/sentiment-template.yml
    with:
      ticker: 'PACB'
      company_name: 'Pacific Biosciences'
      analysis_days: 30
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.NEPHRON_R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.NEPHRON_R2_SECRET_ACCESS_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
